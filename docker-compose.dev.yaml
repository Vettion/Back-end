name: vettion
services:
  db:
    image: mariadb:11.3.2
    container_name: vettion-dev-db
    command: --event-scheduler=ON
    environment:
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      MYSQL_DATABASE: vettion
      MYSQL_PORT: 3306
      MYSQL_ROOT_PASSWORD: password_root
    ports:
      - "3306:3306"
    volumes:
      - ./db:/docker-entrypoint-initdb.d